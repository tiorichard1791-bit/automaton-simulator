    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFD / AFND Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>
            🧠 Autômato Finito Universal 
            <small>AFD / AFND</small>
            <span id="automaton-type-badge" class="automaton-type">⚙️ Determinístico</span>
        </h1>

        <div class="flex-layout">
            <!-- Área SVG -->
            <div class="canvas-area">
                <svg id="automaton-svg" viewBox="0 0 900 550"></svg>
                <div class="canvas-footer">
                    <span class="badge">💡 Arraste os estados para reposicionar</span>
                    <button id="auto-arrange-btn" class="warning">🔄 Organizar</button>
                </div>
            </div>

            <!-- Painéis de controle -->
            <div class="control-panel">
                <!-- Estados -->
                <div class="card">
                    <h3>📍 Estados</h3>
                    <div id="selected-state-info" class="selected-info"></div>
                    <div class="btn-group">
                        <button id="add-state-btn" class="primary">➕ Adicionar</button>
                        <button id="set-initial-btn" class="warning">⭐ Inicial</button>
                        <button id="toggle-final-btn">🔘 Alternar Final</button>
                        <button id="delete-state-btn" class="danger">🗑️ Remover</button>
                    </div>
                    <div class="rename-group">
                        <input type="text" id="rename-state-input" placeholder="Novo nome">
                        <button id="rename-state-btn">✏️ Renomear</button>
                    </div>
                </div>

                <!-- Transições -->
                <div class="card">
                    <h3>🔗 Transições (δ)</h3>
                    <div class="transition-form">
                        <select id="transition-from"></select>
                        <input type="text" id="transition-symbol" placeholder="símbolo" maxlength="5">
                        <button id="add-epsilon-btn" class="epsilon-btn">ε</button>
                        <select id="transition-to"></select>
                        <button id="add-transition-btn" class="primary">Adicionar</button>
                    </div>
                    <div id="transitions-list" class="transitions-list"></div>
                    <button id="clear-transitions-btn" class="danger full-width">🧹 Limpar todas</button>
                    <div class="info-note">🔹 Múltiplas transições com mesmo símbolo são permitidas (AFND). 🔹 ε = transição espontânea.</div>
                </div>

                <!-- Simulação -->
                <div class="card simulation-panel">
                    <h3>🎬 Simulação Visual</h3>
                    <div class="simulation-input">
                        <input type="text" id="simulation-string" placeholder="Cadeia de entrada (ex: aabba)">
                        <button id="visual-run-btn" class="primary">▶️ Executar Automático</button>
                    </div>
                    <div class="sim-controls">
                        <button id="step-init-btn" class="warning">🔧 Iniciar Passo a Passo</button>
                        <button id="step-next-btn" class="success" disabled>⏩ Próximo Símbolo</button>
                        <button id="step-reset-btn" class="danger" disabled>🔄 Reiniciar Passo</button>
                    </div>
                    <div id="step-status" class="step-indicator">Modo inativo</div>
                    <div id="visual-result" class="result"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
